<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Se connecter</title>
        <link href="../css/output.css" rel="stylesheet" />
    </head>

    <body class="min-h-screen flex flex-col items-center justify-center bg-cover bg-center text-gray-800" style="background-image: url('../assets/bg-watercolor.png');">
        <main class="grow h-full flex items-center">
            <div class="flex justify-center items-center gap-8">

                <div class="bg-white shadow-lg rounded-2xl p-8 w-96">
                    <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Se connecter</h1>

                    <form id="login-form" class="space-y-6">
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input
                                type="text"
                                id="email"
                                name="email"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                                required
                            />
                        </div>

                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                                required
                            />
                        </div>

                        <button type="submit" class="w-full bg-teal-500 text-white py-2 rounded-lg hover:bg-teal-600 transition-colors">
                            Se connecter
                        </button>
                    </form>

                    <p class="mt-4 text-center text-sm text-gray-600">
                        Pas encore de compte ?
                        <a href="/pages/register.html" class="text-teal-500 hover:underline">S'inscrire</a>
                    </p>
                </div>

            </div>
        </main>

        <script>
            const form = document.getElementById("login-form");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;

                try {
                    const response = await fetch("http://localhost:5000/login", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem("token", data.token);
                        alert("Connexion réussie !");
                        window.location.href = "/pages/dashboard.html";
                    } else {
                        alert(data.message || "Erreur lors de la connexion.");
                    }

                } catch (error) {
                    console.error("Erreur réseau :", error);
                    alert("Erreur serveur");
                }
            });
        </script>

    </body>
</html>
