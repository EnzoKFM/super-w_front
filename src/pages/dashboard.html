<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Dashboard</title>
        <link href="../css/output.css" rel="stylesheet" />
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    </head>

    <body class="min-h-screen bg-cover bg-center text-gray-800 p-8" style="background-image: url('../assets/bg-watercolor.png');">

        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold underline">Dashboard</h1>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 mb-10">
            <div class="bg-white shadow-md rounded-2xl p-6">
                <h2 class="text-2xl font-semibold text-center mb-10">Créer un produit</h2>
                <form id="product-form-create" class="space-y-4">
                    <input type="hidden" name="csrf_token" id="csrf-token-create" />

                    <input
                        type="text"
                        name="name"
                        placeholder="name"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg"
                        required
                    />
                    <input
                        type="text"
                        name="description"
                        placeholder="Description"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg"
                        required
                    />
                    <input
                        type="file"
                        name="images"
                        multiple
                        class="w-full"
                    />
                    <input
                        type="number"
                        step="0.01"
                        name="price"
                        placeholder="Prix"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg"
                        required
                    />
                    <input
                        type="text"
                        name="category"
                        placeholder="Catégorie"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg"
                        required
                    />

                    <button type="submit" class="w-full bg-teal-500 text-white py-2 rounded-lg hover:bg-teal-600 transition-colors">
                        Créer
                    </button>
                </form>
            </div>

            <div class="bg-white shadow-md rounded-2xl p-6">
                <h2 class="text-2xl font-semibold text-center mb-6">Modifier un produit</h2>
                <select id="product-select-modify" class="w-full mb-4 px-4 py-2 border rounded">
                    <option disabled selected>-- Choisissez un produit --</option>
                </select>
                <form id="product-form-modify"  class="space-y-4">
                    <input type="hidden" name="csrf_token" id="csrf-token-modify" />

                    <input
                        type="text"
                        name="name"
                        id="change_name"
                        placeholder="name"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg"
                    />
                    <input
                        type="text"
                        name="description"
                        id="change_description"
                        placeholder="Description"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg"
                    />
                    <input
                        type="number"
                        name="price"
                        id="change_price"
                        step="0.01"
                        placeholder="Prix"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg"
                    />
                    <input
                        type="text"
                        name="category"
                        id="change_category"
                        placeholder="Catégorie"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg"
                    />

                    <button type="submit" class="w-full bg-yellow-500 text-white py-2 rounded-lg hover:bg-yellow-600 transition-colors">
                        Modifier
                    </button>
                </form>
            </div>

            <div class="bg-white shadow-md rounded-2xl p-6">
                <h2 class="text-2xl font-semibold text-center mb-6">Supprimer un produit</h2>
                <form id="product-form-delete"  class="space-y-4">
                    <input type="hidden" name="csrf_token" id="csrf-token-delete" />

                    <select id="product-select-delete" name="productId" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <option disabled selected>-- Choisissez un produit --</option>
                    </select>

                    <button type="submit" class="w-full bg-red-500 text-white py-2 rounded-lg hover:bg-red-600 transition-colors">
                        Supprimer
                    </button>
                </form>
            </div>
        </div>

        <div class="text-center">
            <button onclick="logout()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded shadow transition">
                Se déconnecter
            </button>
        </div>

        <script>
            function setToast(message, type) {
                localStorage.setItem("pendingToast", JSON.stringify({ message, type }));

                window.location.reload();
            }

            function logout() {
                localStorage.removeItem("token");
                window.location.href = "/pages/home.html";
            }

            let produits = [];

            // On vérifie si l'utilisateur est connecté
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "/pages/connection.html";
            }

            window.addEventListener("DOMContentLoaded", () => {
                const storedToast = localStorage.getItem("pendingToast");
                if (storedToast) {
                    const { message, type } = JSON.parse(storedToast);

                    // Affiche le toast
                    Toastify({
                        text: message,
                        duration: 3000,
                        close: true,
                        gravity: "top",
                        position: "right",
                        stopOnFocus: true,
                        style: {
                            background: type,
                        },
                    }).showToast();

                    // Supprime après affichage
                    localStorage.removeItem("pendingToast");
                }
            });

            fetch("http://localhost:5000/csrf/generate_token", {
                method: "GET",
            })
                .then(data => {
                    const csrfToken = data.headers.get('X-CSRF-token');
                    document.getElementById('csrf-token-create').value = csrfToken
                    document.getElementById('csrf-token-modify').value = csrfToken
                    document.getElementById('csrf-token-delete').value = csrfToken
                })

            fetch("http://localhost:5000/product/list", {
                method: "GET",
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
            })
                .then(res => res.json())
                .then(data => {
                    if(data) {
                        data.data_content.forEach(produit => {
                            const option = document.createElement('option');
                            option.value = produit.id;
                            option.textContent = produit.name;

                            const option2 = document.createElement('option');
                            option2.value = produit.id;
                            option2.textContent = produit.name;

                            document.getElementById('product-select-modify').appendChild(option);
                            document.getElementById('product-select-delete').appendChild(option2);
                        })

                        produits = data.data_content
                    }
                    
                })

            document.getElementById('product-select-modify').addEventListener("change", () => {
                const produitChoisi = produits.find(p => p.id == document.getElementById('product-select-modify').value);

                if (produitChoisi) {
                    document.getElementById('change_name').value = produitChoisi.name
                    document.getElementById('change_description').value = produitChoisi.description
                    document.getElementById('change_price').value = produitChoisi.price
                    document.getElementById('change_category').value = produitChoisi.category
                }
            });

            document.getElementById('product-form-create').addEventListener('submit', async function(e) {
                e.preventDefault(); // Empêche l’envoi classique du form

                const formData = new FormData(this);

                const payload = {
                    name: formData.get('name'),
                    description: formData.get('description'),
                    images: formData.get('images'),
                    price: parseInt(formData.get('price')),
                    category: formData.get('category')
                };

                const csrfToken = formData.get('csrf_token')

                await fetch('http://localhost:5000/product/new', {
                    method: 'PUT',
                    headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-token': csrfToken,
                    'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                setToast("Produit crée", "linear-gradient(to right, #40d130, #17870b)")
            });

            document.getElementById('product-form-modify').addEventListener('submit', async function(e) {
                e.preventDefault(); // Empêche l’envoi classique du form

                const formData = new FormData(this);

                const payload = {
                    name: formData.get('name'),
                    description: formData.get('description'),
                    images: formData.get('images'),
                    price: parseInt(formData.get('price')),
                    category: formData.get('category'),
                    id: produits.find(p => p.id == document.getElementById('product-select-modify').value).id
                };

                const csrfToken = formData.get('csrf_token')

                await fetch('http://localhost:5000/product/update', {
                    method: 'PATCH',
                    headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-token': csrfToken,
                    'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                setToast("Produit modifié", "linear-gradient(to right, #f2ef33, #b8b50b)")
            });

            document.getElementById('product-form-delete').addEventListener('submit', async function(e) {
                e.preventDefault(); // Empêche l’envoi classique du form

                const formData = new FormData(this);

                const payload = {
                    id: formData.get('productId')
                };

                const csrfToken = formData.get('csrf_token')

                await fetch('http://localhost:5000/product/delete', {
                    method: 'DELETE',
                    headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-token': csrfToken,
                    'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                setToast("Produit supprimé", "linear-gradient(to right, #c92424, #9c0505)");
            });
        </script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    </body>
</html>
