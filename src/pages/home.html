<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Accueil</title>
    <link href="../css/output.css" rel="stylesheet">
</head>
<body>
    <div class="text-center mb-5">
        <h1 class="text-3xl underline">
            Bienvenue à Super-W !
        </h1>
        <h2 class="text-xl">
            Ici, tout nos produits sont fait-maison, et avec amour !
        </h2>
        
    </div>
    <div class="fixed right-5 top-3">
        <button onClick="togglePanier()" class="cursor-pointer">
            <img src="../img/panier.png" class="mx-auto mb-2 max-h-12">
        </button>
        <a href="http://localhost:3000/pages/connection" >
            <button class="cursor-pointer">
                <img src="../img/user.png" class="mx-auto mb-2 max-h-12">
            </button>
        </a>
        
    </div>
    <div id="panierOverlay" class="fixed inset-0 bg-black/50 flex justify-end hidden">
        <div class="bg-white w-80 p-4 shadow-lg overflow-y-auto">
            <button onclick="togglePanier()" class="text-red-500 font-bold mb-4 cursor-pointer">Fermer</button>
            <h2 class="text-2xl font-bold mb-2">Votre Panier</h2>
            <ul id="panier" class="space-y-2"></ul>
            <p class="mt-2 font-bold">Total : <span id="total">0</span> €</p>
        </div>
    </div>
    <div>
        <ul id="listProduits" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></ul>
    </div>

    <script>
        //fetch("localhost:5000/")
        const produits = [
            { id: 0, label: "Lait au fraise", description: "Je suis un mignon produit", images: ["../img/lait_fraise.png"], price: 500, category: "categorie" },
            { id: 1, label: "Salle de sport", description: "Je suis un mignon produit", images: ["../img/salle_sport.jpg"], price: 500, category: "categorie" },
            { id: 2, label: "Game Cube", description: "Je suis un mignon produit", images: ["../img/gamecube.jpg"], price: 500, category: "categorie" }
        ];

        // Récupérer le panier depuis localStorage ou tableau vide par défaut
        const panierItems = JSON.parse(localStorage.getItem('panier')) || [];

        afficherProduits();
        afficherPanier();

        function afficherProduits(){
            document.getElementById('listProduits').innerHTML = produits.map((produit) => {
                return `
                <li class="border rounded p-4 text-center shadow hover:shadow-lg transition">
                    <a href="http://localhost:3000/pages/page_produit?id=${produit.id}"><img src="${produit.images[0]}" alt="${produit.label}" class="mx-auto mb-2 max-h-40 object-contain">
                    <h3 class="text-lg font-semibold">${produit.label}</h3></a>
                    <p class="text-gray-500">${produit.description}</p>
                    <p class="text-xl font-bold my-2">${produit.price} €</p>
                    <button onclick="ajouterAuPanier(${produit.id})" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition cursor-pointer">
                        Ajouter au panier
                    </button>
                </li>`;
            }).join('');
        }
        

        function ajouterAuPanier(id) {
            const index = panierItems.findIndex(item => item.produit.id === id);
            if (index !== -1) {
                // Produit déjà dans le panier : on augmente la quantité
                panierItems[index].quantite++;
            } else {
                // Nouveau produit ajouté
                const produit = produits.find(p => p.id === id);
                panierItems.push({ produit, quantite: 1 });
            }
            afficherPanier();
        }

        function modifierQuantite(index, nouvelleQuantite) {
            if (nouvelleQuantite <= 0) {
                panierItems.splice(index, 1);
            } else {
                panierItems[index].quantite = nouvelleQuantite;
            }
            afficherPanier();
        }

        function afficherPanier() {
            const panier = document.getElementById('panier');
            panier.innerHTML = panierItems.map((item, index) => `
                <li class="flex justify-between items-center border-b py-2">
                    <span>${item.produit.label}</span>
                    <div class="flex items-center gap-2">
                        <button onclick="modifierQuantite(${index}, ${item.quantite - 1})" class="text-red-500 font-bold px-2 cursor-pointer">-</button>
                        <span>${item.quantite}</span>
                        <button onclick="modifierQuantite(${index}, ${item.quantite + 1})" class="text-green-500 font-bold px-2 cursor-pointer">+</button>
                        <span>${item.produit.price * item.quantite} €</span>
                        <span onclick="retirerProduit(${index})" class="cursor-pointer" >
                            <img src="../img/remove.png" class="max-h-5">
                        </span>
                    </div>
                </li>
            `).join('');

            const total = panierItems.reduce((sum, item) => sum + item.produit.price * item.quantite, 0);
            document.getElementById('total').textContent = total;

            // Sauvegarde dans localStorage
            localStorage.setItem('panier', JSON.stringify(panierItems));
        }

        function togglePanier() {
            document.getElementById('panierOverlay').classList.toggle('hidden');
        }

        function retirerProduit(index) {
            panierItems.splice(index,1)
            afficherPanier();
        }
    </script>
    
</body>
</html>
