<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>title</title>
    <link href="../css/output.css" rel="stylesheet">
</head>
<body>
    <div class="text-center">
        <h1 id="name-produit" class="text-3xl font-bold mb-5">Chargement...</h1>
        <div class="carousel text-center">
            <div class="carousel-container">
                <img id="carousel-image" src="" alt="Image du produit" class="mx-auto h-64" />
            </div>
            <div class="mt-4">
                <button onclick="changeImage(-1)">◀</button>
                <button onclick="changeImage(1)">▶</button>
            </div>
        </div>
        <div class="mb-10">
            <p id="description-produit"></p>
            <p><strong>Prix :</strong> <span id="price-produit"></span> €</p>
        </div>

        <a href="http://localhost:3000/pages/home.html" class="border rounded border-gray-300 px-2 py-1 cursor-pointer">Retour</a>
    </div>

    <script>
        let indexImage = 0;
        let imagesProduit = [];

        function showImage() {
            const imgElement = document.getElementById("carousel-image");
            imgElement.src = imagesProduit[indexImage].url;
        }

        function changeImage(direction) {
            indexImage = (indexImage + direction + imagesProduit.length) % imagesProduit.length;
            showImage();
        }

        // Récupérer l'ID depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const produitId = parseInt(urlParams.get('id'));

        fetch(`http://localhost:5000/product/details?id=${produitId}`, {
            method: "GET",
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
        })
        .then(res => res.json())
        .then(produit => {
            if (produit) {
                document.getElementById("name-produit").textContent = produit.data_content.name;
                document.getElementById("description-produit").textContent = produit.data_content.description;
                document.getElementById("price-produit").textContent = produit.data_content.price;

                imagesProduit = produit.data_content.images;
                // Initialisation
                showImage();
                setInterval(() => changeImage(1), 4000);
            } else {
                document.body.innerHTML = "<h2>Produit introuvable</h2>";
            }
        })
    </script>
</body>
</html>
