<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Créer un compte</title>
        <link href="../css/output.css" rel="stylesheet" />
    </head>

    <body class="min-h-screen flex flex-col items-center justify-center bg-cover bg-center text-gray-800" id="div-admin">
        <main class="grow h-full flex items-center">
            <div class="bg-white shadow-lg rounded-2xl p-8 w-96">
                <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Créer un compte</h1>

                <form id="register-form" class="space-y-6">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                            required
                        />
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                            required
                        />
                    </div>

                    <button type="submit"
                        class="w-full bg-teal-500 text-white py-2 rounded-lg hover:bg-teal-600 transition-colors">
                        S'inscrire
                    </button>
                </form>

                <p class="mt-4 text-center text-sm text-gray-600">
                    Déjà un compte ?
                    <a href="/connection" class="text-teal-500 hover:underline">Se connecter</a>
                </p>
            </div>
        </main>

        <script src="/js/register.js"></script>
        
    </body>
</html>
