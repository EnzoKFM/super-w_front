<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Créer un compte</title>
    <link href="../css/output.css" rel="stylesheet">
</head>
<body>
    <div class="text-center">
        <h1 class="font-bold text-3xl">S'inscrire</h1><br>
        <form action="http://localhost:3000/" method="POST" class="mb-1">
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" value="" class="border border-gray-300 rounded px-2 py-1">
            </div><br>
            
            <div class="mb-5">
                <label for="password">Password:</label>
                <input type="text" id="password" name="password" value="" class="border border-gray-300 rounded px-2 py-1">
            </div>

            <input type="submit" value="Submit" class="border border-gray-300 rounded px-2 py-1 cursor-pointer">
        </form>
        <h2 class="mb-10">
            Déjà un compte ? <a href="http://localhost:3000/pages/connection" class="text-blue-500 hover:underline">Se connecter</a>
        </h2>
        
        <a href="http://localhost:3000/pages/home.html" class="border rounded border-gray-300 px-2 py-1 cursor-pointer">Retour</a>
    </div>
    
</body>
</html>
